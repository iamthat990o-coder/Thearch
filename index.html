<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>The Archive</title>
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Times New Roman', Times, Georgia, serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 30%, rgba(17, 24, 39, 1) 0%, var(--bg-color) 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-primary);
            overflow: hidden;
        }

        .card {
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 4px;
            width: 380px;
            text-align: center;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 7px;
            margin-bottom: 5px;
            font-weight: 400;
        }

        .subtitle {
            font-family: Arial, sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: var(--bg-color);
            border: none;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        button:hover {
            background: transparent;
            color: var(--accent);
            box-shadow: inset 0 0 0 1px var(--accent);
        }

        /* تنسيق عداد الزوار ليكون أنيقاً ومتناسقاً مع التصميم */
        .visitor-counter {
            margin-top: 30px;
            font-family: Arial, sans-serif;
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>THE ARCHIVE</h1>
        <div class="subtitle">Private Intelligence Repository</div>
        
        <!-- تم تبسيط الزر ليكون للدخول المباشر بما أن الهدف هو عد الزوار فقط -->
        <button onclick="go()">Enter Repository</button>
        
        <!-- عداد الزوار التلقائي المربوط بسيرفر عداد مجاني وسريع -->
        <div class="visitor-counter">
            System Encounters: 
            <img src="https://hitwebcounter.com/counter/counter.php?page=11948102&style=0005&nbdigits=5&type=page&initCount=0" title="Counter" Alt="Visitors"   border="0" style="vertical-align: middle; margin-left: 5px; filter: invert(1) contrast(200%); height: 12px;">
        </div>
    </div>

<script>
function go(){
    // التوجيه الفوري والمباشر
    location.href = "https://sites.google.com/view/the-archive-of-my-brain-/";
}
</script>

</body>
</html>
