<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>The Archive</title>
    <!-- استدعاء مكتبة EmailJS الأصلية -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        // تفعيل الحساب باستخدام الـ Public Key الجديد الخاص بكِ
        emailjs.init({publicKey: "s9|nRGmVkxa0FwVwT"});
    </script>
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Times New Roman', Times, Georgia, serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 30%, rgba(17, 24, 39, 1) 0%, var(--bg-color) 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-primary);
            overflow: hidden;
        }

        .card {
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 4px; /* زوايا مستقيمة وفخمة بنمط Modern Noir */
            width: 380px;
            text-align: center;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 7px;
            margin-bottom: 5px;
            font-weight: 400;
        }

        .subtitle {
            font-family: Arial, sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        input {
            width: 100%;
            padding: 14px 10px;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            box-sizing: border-box;
            text-align: center;
            font-family: Arial, sans-serif;
            margin-bottom: 20px;
        }

        input:focus { 
            border-bottom: 1px solid var(--accent); 
        }

        input::placeholder { 
            color: rgba(255, 255, 255, 0.25); 
            letter-spacing: 1px; 
            font-size: 0.85rem; 
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: var(--bg-color);
            border: none;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        button:hover {
            background: transparent;
            color: var(--accent);
            box-shadow: inset 0 0 0 1px var(--accent);
        }

        #status { 
            display: none; 
            margin-top: 20px; 
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>THE ARCHIVE</h1>
        <div class="subtitle">Private Intelligence Repository</div>
        <input id="email" type="email" placeholder="ENTER YOUR EMAIL">
        <button onclick="go()">Access Repository</button>
        
        <div id="status">
            <h3>ACCESS CONFIRMED</h3>
            <p>Welcome.</p>
        </div>
    </div>

<script>
function go(){
    const e = document.getElementById('email').value;
    if(!e){
        alert('Enter your email');
        return;
    }
    
    // إرسال البيانات باستخدام المعرفات الجديدة الصحيحة
    emailjs.send("service_6k89ba9", "template_68r2hdj", {
        visitor_email: e
    })
    .finally(() => {
        // إظهار رسالة النجاح فوراً والتوجيه التلقائي بعد ثانيتين مثل الكود الأول
        document.getElementById('status').style.display = 'block';
        setTimeout(() => {
            location.href = "https://sites.google.com/view/the-archive-of-my-brain-/";
        }, 2000);
    });
}
</script>

</body>
</html>
