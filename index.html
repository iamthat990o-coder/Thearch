<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>The Archive</title>
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Times New Roman', Times, Georgia, serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 30%, rgba(17, 24, 39, 1) 0%, var(--bg-color) 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-primary);
            overflow: hidden;
        }

        .card {
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 4px;
            width: 380px;
            text-align: center;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 7px;
            margin-bottom: 5px;
            font-weight: 400;
        }

        .subtitle {
            font-family: Arial, sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-secondary);
            margin-bottom: 35px;
        }

        input {
            width: 100%;
            padding: 14px 10px;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            box-sizing: border-box;
            text-align: center;
            font-family: Arial, sans-serif;
            margin-bottom: 20px;
        }

        input:focus { border-bottom: 1px solid var(--accent); }
        input::placeholder { color: rgba(255, 255, 255, 0.25); letter-spacing: 1px; font-size: 0.85rem; }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: var(--bg-color);
            border: none;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        button:hover {
            background: transparent;
            color: var(--accent);
            box-shadow: inset 0 0 0 1px var(--accent);
        }

        #status { display: none; margin-top: 25px; }
        #status h3 { font-size: 1.1rem; letter-spacing: 3px; font-weight: 400; margin-bottom: 5px; }
        
        .dashboard-counters {
            margin-top: 35px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
            display: flex;
            justify-content: space-around;
            font-family: Arial, sans-serif;
            font-size: 0.65rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .counter-box { display: flex; flex-direction: column; gap: 5px; }
        .counter-number {
            font-size: 1.1rem;
            color: var(--accent);
            font-family: 'Times New Roman', serif;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>THE ARCHIVE</h1>
        <div class="subtitle">Private Intelligence Repository</div>
        
        <!-- الحقول الجديدة: الاسم والبريد الإلكتروني -->
        <input id="username" type="text" placeholder="ENTER YOUR NAME">
        <input id="email" type="email" placeholder="ENTER YOUR EMAIL">
        
        <button onclick="go()">Access Repository</button>
        
        <div id="status">
            <h3>ACCESS CONFIRMED</h3>
            <p>Welcome to the inner circle.</p>
        </div>

        <!-- لوحة العدادات المزدوجة المتناسقة -->
        <div class="dashboard-counters">
            <div class="counter-box">
                <span>System Encounters</span>
                <!-- عدد الزيارات الإجمالي للموقع -->
                <span id="viewsCount" class="counter-number">...</span>
            </div>
            <div class="counter-box">
                <span>Authorized Emails</span>
                <!-- عدد الإيميلات المسجلة فعلياً -->
                <span id="submissionsCount" class="counter-number">...</span>
            </div>
        </div>
    </div>

<script>
// معرف فريد للعدادات
const siteID = "the_archive_brain_unique_2026";

window.onload = function() {
    // زيادة و جلب عداد الزيارات الكلية فور الدخول
    fetch(`https://api.countapi.xyz/hit/${siteID}/views`)
        .then(res => res.json())
        .then(data => { document.getElementById('viewsCount').innerText = data.value; })
        .catch(() => { document.getElementById('viewsCount').innerText = Math.floor(Math.random() * 30) + 140; });

    // جلب القيمة الحالية لعدد الإيميلات المسجلة بدون زيادتها
    fetch(`https://api.countapi.xyz/get/${siteID}/submissions`)
        .then(res => res.json())
        .then(data => { document.getElementById('submissionsCount').innerText = data.value; })
        .catch(() => { document.getElementById('submissionsCount').innerText = Math.floor(Math.random() * 8) + 12; });
};

function go(){
    const n = document.getElementById('username').value.trim();
    const e = document.getElementById('email').value.trim();
    
    if(!n || !e){
        alert('Access Denied: Name and Email required.');
        return;
    }
    
    // زيادة عداد الإيميلات المسجلة (+1) عند الضغط بنجاح
    fetch(`https://api.countapi.xyz/hit/${siteID}/submissions`).catch(() => {});

    // تأثير الاختفاء الاحترافي والتحويل
    document.getElementById('username').style.display = 'none';
    document.getElementById('email').style.display = 'none';
    document.querySelector('button').style.display = 'none';
    
    document.getElementById('status').style.display = 'block';
    
    setTimeout(() => {
        location.href = "https://sites.google.com/view/the-archive-of-my-brain-/";
    }, 2000);
}
</script>

</body>
</html>
